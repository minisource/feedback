        type: string
      description:
        maxLength: 10000
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        type: string
    type: object
  github_com_minisource_feedback_internal_models.UpdateSettingRequest:
    properties:
      description:
        type: string
      isPublic:
        type: boolean
      key:
        type: string
