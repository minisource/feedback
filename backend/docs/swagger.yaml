  github_com_minisource_feedback_internal_models.FeedbackStats:
    properties:
      feedbackByCategory:
        additionalProperties:
          format: int64
          type: integer
        type: object
      feedbackByStatus:
        additionalProperties:
          format: int64
          type: integer
        type: object
      recentActivity:
