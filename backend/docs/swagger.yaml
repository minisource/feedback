        type: string
      createdAt:
        type: string
      emailEnabled:
        type: boolean
      feedbackId:
        type: string
      id:
        type: string
      pushEnabled:
        type: boolean
      subscribeAll:
        type: boolean
      types:
        items:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.SubscriptionType'
