      icon:
        type: string
      isActive:
        type: boolean
      name:
        maxLength: 100
        type: string
      parentId:
        type: string
      slug:
        type: string
      sortOrder:
        type: integer
    type: object
  github_com_minisource_feedback_internal_models.UpdateCommentRequest:
    properties:
      content:
        maxLength: 2000
