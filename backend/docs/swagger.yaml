        items:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.Attachment'
        type: array
      authorAvatar:
        type: string
      authorEmail:
        type: string
      authorId:
        description: Author information
        type: string
      authorName:
        type: string
      categoryId:
        description: Category and tags
