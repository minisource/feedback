    x-enum-varnames:
    - VoteUp
    - VoteDown
host: localhost:5012
info:
  contact: {}
  description: Feedback management service for Minisource
  title: Feedback Service API
  version: "1.0"
paths:
  /admin/categories:
    post:
      consumes:
      - application/json
      parameters:
      - description: Create category request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Category'
      summary: Create category
      tags:
      - Admin - Categories
  /admin/categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Delete category
      tags:
      - Admin - Categories
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Update category request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Category'
      summary: Update category
      tags:
      - Admin - Categories
  /admin/feedback/{id}/approve:
    post:
      parameters:
      - description: Feedback ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Feedback'
      summary: Approve feedback
      tags:
      - Admin - Moderation
  /admin/feedback/{id}/reject:
    post:
      parameters:
      - description: Feedback ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Feedback'
      summary: Reject feedback
      tags:
      - Admin - Moderation
  /admin/feedback/{id}/response:
    post:
      consumes:
      - application/json
      parameters:
      - description: Feedback ID
        in: path
        name: id
        required: true
        type: string
      - description: Official response
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Feedback'
      summary: Add official response
      tags:
      - Admin - Moderation
  /admin/feedback/{id}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: Feedback ID
        in: path
        name: id
        required: true
        type: string
      - description: Status update request
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Feedback'
      summary: Update feedback status
      tags:
      - Admin - Moderation
  /admin/feedback/pending:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get pending feedback
      tags:
      - Admin - Moderation
  /admin/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_minisource_feedback_internal_models.Setting'
            type: array
      summary: Get all settings
      tags:
      - Admin - Settings
    put:
      consumes:
      - application/json
      parameters:
      - description: Update setting request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.UpdateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update setting
      tags:
      - Admin - Settings
  /admin/settings/initialize:
    post:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Initialize default settings
      tags:
      - Admin - Settings
  /admin/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.FeedbackStats'
      summary: Get dashboard statistics
      tags:
      - Admin - Stats
  /categories:
    get:
      parameters:
      - description: Only active categories
        in: query
        name: active_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_minisource_feedback_internal_models.Category'
            type: array
      summary: List categories
      tags:
      - Categories
  /categories/{id}:
    get:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_minisource_feedback_internal_models.Category'
      summary: Get category
      tags:
      - Categories
  /comments/{id}:
    delete:
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Delete comment
      tags:
      - Comments
    get:
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comment.Comment'
      summary: Get comment by ID
      tags:
      - Comments
    put:
      consumes:
      - application/json
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      - description: Update comment request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comment.Comment'
      summary: Update comment
      tags:
      - Comments
  /comments/{id}/reactions:
    delete:
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Remove reaction from comment
      tags:
      - Comments
    post:
      consumes:
      - application/json
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      - description: Reaction request
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add reaction to comment
      tags:
      - Comments
  /comments/{id}/replies:
    get:
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comment.RepliesResponse'
      summary: Get replies to a comment
      tags:
      - Comments
  /feedback:
    get:
      parameters:
      - collectionFormat: csv
        description: Filter by status
        in: query
        items:
          type: string
        name: status
        type: array
      - description: Filter by category
        in: query
        name: category_id
        type: string
      - collectionFormat: csv
        description: Filter by tags
        in: query
        items:
          type: string
        name: tags
        type: array
      - description: Search text
        in: query
        name: search
        type: string
      - description: Sort by (new, top, trending, most_commented)
        in: query
        name: sort_by
        type: string
      - description: Page number
        in: query
        name: page
