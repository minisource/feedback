          time decay)
        type: number
      updatedAt:
        type: string
      upvotes:
        description: Voting
        type: integer
      viewCount:
        description: Engagement metrics
        type: integer
      voteScore:
        description: upvotes - downvotes
        type: integer
    type: object
  github_com_minisource_feedback_internal_models.FeedbackResponse:
    properties:
      attachments:
        items:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.Attachment'
        type: array
      authorId:
        type: string
      authorName:
        type: string
      category:
        $ref: '#/definitions/github_com_minisource_feedback_internal_models.CategorySummary'
      categoryId:
        type: string
      commentCount:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      downvotes:
        type: integer
      id:
        type: string
      isSubscribed:
        type: boolean
      officialResponse:
        $ref: '#/definitions/github_com_minisource_feedback_internal_models.OfficialResponse'
      status:
        $ref: '#/definitions/github_com_minisource_feedback_internal_models.FeedbackStatus'
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updatedAt:
        type: string
      upvotes:
        type: integer
      userVote:
        type: string
      viewCount:
        type: integer
      voteScore:
        type: integer
