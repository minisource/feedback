  github_com_minisource_feedback_internal_models.Subscription:
    properties:
      categoryId:
        description: Subscribe to category
        type: string
      createdAt:
        description: Timestamps
        type: string
      emailEnabled:
        description: Notification preferences
        type: boolean
      feedbackId:
        description: What to subscribe to
        type: string
      id:
        type: string
      isActive:
        description: Status
        type: boolean
      pushEnabled:
        type: boolean
      subscribeAll:
        description: Subscribe to all new feedback
        type: boolean
      tenantId:
        type: string
      types:
        description: Subscription types
        items:
          $ref: '#/definitions/github_com_minisource_feedback_internal_models.SubscriptionType'
